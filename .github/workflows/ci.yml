name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore .\OneWaySyncV2.sln

      - name: Build
        run: dotnet build .\OneWaySyncV2.sln --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test .\tests\OneWaySyncV2.UnitTests\OneWaySyncV2.UnitTests.csproj --configuration Release --no-build --no-restore --logger "trx;LogFileName=unit-tests.trx" --results-directory .\TestResults

      - name: Integration tests
        run: dotnet test .\tests\OneWaySyncV2.IntegrationTests\OneWaySyncV2.IntegrationTests.csproj --configuration Release --no-build --no-restore --logger "trx;LogFileName=integration-tests.trx" --results-directory .\TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .\TestResults

      - name: Publish
        if: github.event_name != 'pull_request'
        run: dotnet publish .\src\OneWaySyncV2.Cli\OneWaySyncV2.Cli.csproj --configuration Release --runtime win-x64 --self-contained false --output .\publish\win-x64

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: OneWaySyncV2-win-x64
          path: .\publish\win-x64